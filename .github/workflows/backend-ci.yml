name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "BankingSystem/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "BankingSystem/**"

env:
  DOTNET_VERSION: "10.0.x"
  SOLUTION_PATH: "BankingSystem/BankingSystem.slnx"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

# ยกเลิก run ก่อนหน้าถ้า push ใหม่เข้ามาใน PR เดียวกัน
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Service containers สำหรับ Integration Tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root1234
          POSTGRES_DB: banking_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ===== SETUP =====
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ===== CACHE =====
      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # ===== RESTORE =====
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      # ===== BUILD =====
      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      # ===== UNIT TESTS =====
      - name: Run Unit Tests
        run: |
          dotnet test BankingSystem/Banking.Tests.Unit \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results/unit

      # ===== INTEGRATION TESTS =====
      - name: Run Integration Tests
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=banking_dev;Username=postgres;Password=root1234"
          ConnectionStrings__Redis: "localhost:6379"
          Jwt__Key: "evtJQQOZpJsxeogpTZNiLQdvqmFqRGsV"
          Jwt__Issuer: "BankingSystem.Test"
          Jwt__Audience: "BankingSystem.Test"
          ASPNETCORE_ENVIRONMENT: "Testing"
        run: |
          dotnet test BankingSystem/Banking.Tests.Integration \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --results-directory ./test-results/integration

      # ===== TEST REPORT =====
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/
          retention-days: 7

      # ===== CODE COVERAGE REPORT =====
      - name: Generate Coverage Report
        if: success()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:./test-results/**/coverage.cobertura.xml \
            -targetdir:./coverage-report \
            -reporttypes:Cobertura

      - name: Upload Coverage to Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: coverage-report
          path: ./coverage-report/
          retention-days: 7

      # ===== PR COMMENT (Coverage) =====
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          header: coverage
          path: ./coverage-report/Cobertura.xml
          message: |
            ## Code Coverage Report
            Coverage report uploaded as artifact.