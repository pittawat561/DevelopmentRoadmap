name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - "BankingSystem/**"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom image tag"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/banking-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ===== DOCKER SETUP =====
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ===== METADATA (TAGS & LABELS) =====
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # sha-xxxxxxx (short commit hash)
            type=sha,prefix=sha-
            # latest (สำหรับ main branch)
            type=raw,value=latest,enable={{is_default_branch}}
            # custom tag (จาก workflow_dispatch)
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            # v1.2.3 (จาก git tag)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ===== BUILD & PUSH =====
      - name: Build and Push image
        uses: docker/build-push-action@v7
        with:
          context: ./BankingSystem
          file: ./BankingSystem/Banking.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}

      # ===== OUTPUT =====
      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.tags }}"