name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Backend CI", "Docker Build & Push"]
    branches: [main]
    types: [completed]

jobs:
  # ===== CHECK PREREQUISITES =====
  check:
    name: Verify CI passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_deploy: ${{ steps.check.outputs.result }}
    steps:
      - name: Check all workflows passed
        id: check
        run: echo "result=true" >> $GITHUB_OUTPUT

  # ===== DEPLOY BACKEND TO RAILWAY =====
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    environment: staging
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (Staging)
        run: |
          railway up \
            --service banking-api-staging \
            --environment staging \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ===== HEALTH CHECK =====
      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          MAX_RETRIES=10
          RETRY_COUNT=0
          HEALTH_URL="${{ vars.STAGING_URL }}/health"

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed! (HTTP $HTTP_STATUS)"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Attempt $RETRY_COUNT/$MAX_RETRIES: HTTP $HTTP_STATUS - Retrying in 10s..."
            sleep 10
          done

          echo "Health check failed after $MAX_RETRIES attempts!"
          exit 1

      # ===== SMOKE TEST =====
      - name: Run smoke tests
        run: |
          API_URL="${{ vars.STAGING_URL }}"

          echo "Testing auth endpoint..."
          curl -sf "$API_URL/api/auth/login" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com","password":"wrong"}' \
            || echo "Auth endpoint responding (expected 401)"

          echo ""
          echo "Testing health endpoint..."
          curl -sf "$API_URL/health"

          echo ""
          echo "Smoke tests passed!"

  # ===== DEPLOY FRONTEND TO VERCEL =====
  deploy-frontend:
    name: Deploy Frontend (Vercel Preview)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: |
          vercel pull \
            --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: banking-frontend

      - name: Build with Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: banking-frontend

      - name: Deploy to Vercel (Preview)
        id: deploy
        run: |
          URL=$(vercel deploy \
            --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
        working-directory: banking-frontend

      - name: Output preview URL
        run: echo "Deployed to ${{ steps.deploy.outputs.preview_url }}"

  # ===== NOTIFICATION =====
  notify:
    name: Notify team
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Staging Deploy: ${{ needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success' && '✅ Success' || '❌ Failed' }}\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}"
            }